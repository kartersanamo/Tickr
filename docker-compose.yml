services:
  tickr-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: tickr-api
    restart: unless-stopped
    env_file:
      - .env.dashboard
    ports:
      - "8790:8790"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TICKETS_BOT_API_URL: http://host.docker.internal:8788

  tickr-web:
    build:
      context: web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://tickr.kartersanamo.com}
        NEXT_PUBLIC_BOT_INVITE_URL: ${NEXT_PUBLIC_BOT_INVITE_URL:-}
        NEXT_PUBLIC_DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
    container_name: tickr-web
    restart: unless-stopped
    env_file:
      - .env.dashboard
    ports:
      - "8005:3000"
    depends_on:
      - tickr-api
    environment:
      TICKR_API_URL: http://tickr-api:8790
