services:
  tickr-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: tickr-api
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env.dashboard
    environment:
      TICKETS_BOT_API_URL: http://127.0.0.1:8788
      DB_HOST: 127.0.0.1

  tickr-web:
    build:
      context: web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://tickr.kartersanamo.com}
        NEXT_PUBLIC_BOT_INVITE_URL: ${NEXT_PUBLIC_BOT_INVITE_URL:-}
        NEXT_PUBLIC_DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
    container_name: tickr-web
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env.dashboard
    depends_on:
      - tickr-api
    environment:
      PORT: 8005
      HOSTNAME: 0.0.0.0
      TICKR_API_URL: http://127.0.0.1:8790
